@if (taskModalSer.isOpen()) {
<div class="fixed inset-0 flex items-center justify-center">
    <div class="bg-indigo-900 rounded-2xl shadow-xl p-6 w-6/12 h-auto dark:bg-gray-900 border border-white">
        
        <div class="flex justify-end pb-4">
            <button (click)="taskModalSer.close(); taskSer.deselectTask()" type="button">
                <lucide-icon name="circle-x" size="32" color="white"></lucide-icon>
            </button>
        </div>

        @if(taskSer.selTask() != null) {
            <div class="text-white text-center p-6 text-2xl">Editando tarea</div>
        }@else {
            <div class="text-white text-center p-6 text-2xl">Creando tarea</div>
        }

        <div class="text-center p-6">
            <input type="text" class="block w-full rounded border-0 py-3 pl-11 pr-4 transition duration-150 
                ease-in-out shadow-inner bg-white text-black placeholder:text-gray-600 dark:bg-gray-800 
                dark:text-white dark:placeholder:text-gray-400" placeholder="Título"
                [value]="taskSer.title()" (change)="taskSer.title.set($any($event.target).value)">
        </div>

        <div class="text-white text-center p-6">
            <textarea class="h-62.5 block w-full rounded border-0 py-3 pl-11 pr-4 transition duration-150 
                ease-in-out shadow-inner bg-white text-black placeholder:text-gray-600 dark:bg-gray-800 
                dark:text-white dark:placeholder:text-gray-400" placeholder="Descripción"
                    [value]="taskSer.description()" (change)="taskSer.description.set($any($event.target).value)"></textarea>
        </div>

        <div class="text-center p-6">
            @if(taskSer.selTask() != null) {
                <button (click)="taskSer.save()" class="w-3/12 bg-teal-700 text-white px-4 py-2 rounded active:scale-[0.990]" type="button">Guardar</button>
            }@else {
                <button (click)="taskSer.create()" class="w-3/12 bg-teal-700 text-white px-4 py-2 rounded active:scale-[0.990]" type="button">Crear</button>
            }
        </div>
    </div>
</div>
}
