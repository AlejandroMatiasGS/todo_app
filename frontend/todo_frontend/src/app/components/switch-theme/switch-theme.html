<label class="flex items-center gap-3 cursor-pointer select-none">
  <div class="relative" (click)="theme.toggleTheme()">

    <!-- track -->
    <div class="w-14 h-8 rounded-full transition-colors duration-300
                bg-gray-300 dark:bg-indigo-600">
    </div>

    <!-- thumb -->
    <div class="absolute top-1 left-1 w-6 h-6 bg-white rounded-full shadow 
                transition-transform duration-300
                translate-x-0 dark:translate-x-6">
    </div>

  </div>

  <!-- label -->
  <span class="text-sm font-medium text-gray-700 dark:text-gray-100">
    {{ theme.isDark() ? 'Modo Oscuro' : 'Modo Claro' }}
  </span>
</label>
