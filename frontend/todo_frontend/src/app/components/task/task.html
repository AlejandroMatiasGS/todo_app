<div (click)="taskSer.selectTask(task()); taskModalSer.open()" class="border flex flex-col gap-2 border-black bg-indigo-900 text-white active:scale-[0.995] dark:text-white 
    dark:border-white dark:bg-gray-900 hover:-translate-y-1 transition-transform duration-200 w-full h-full rounded-lg p-0">

    <div class="py-2 px-6 justify-start flex-row flex gap-2">
        <div>
            <input (click)="$event.stopPropagation()" type="checkbox" name="check" id="check" [checked]="taskSer.isSelected(task().id)" (change)="taskSer.toggle(task())">
        </div>
    </div>
    
    <div
        class="px-6 pb-4">
        {{ task().title }}
    </div>
</div>
